name: Deploy monitoring — Prod

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy (default: main)'
        required: false
        default: 'main'
      confirm:
        description: 'Type deploy to confirm production deploy'
        required: true
        default: ''

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy OpenObserve to Prod VPS
    runs-on: ubuntu-latest
    environment: production
    if: github.event.inputs.confirm == 'deploy'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Prepare deploy bundle
        env:
          OPENOBSERVE_ROOT_PASSWORD: ${{ secrets.OPENOBSERVE_ROOT_PASSWORD }}
        run: |
          set -euo pipefail
          rm -rf monitoring-upload
          mkdir -p monitoring-upload
          cp monitoring/docker-compose.yml monitoring-upload/
          cp monitoring/otel-collector-config.yaml monitoring-upload/
          node scripts/render-monitoring-env.mjs --deploy-env prod --output monitoring-upload/monitoring.env
          ls -la monitoring-upload/

      - name: Upload to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_SSH_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -p "$VPS_PORT" -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            "$VPS_USER@$VPS_HOST" "mkdir -p /apps/monitoring/current"
          scp -P "$VPS_PORT" -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            monitoring-upload/docker-compose.yml \
            monitoring-upload/otel-collector-config.yaml \
            monitoring-upload/monitoring.env \
            "$VPS_USER@$VPS_HOST:/apps/monitoring/current/"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -euo pipefail
            DEPLOY_DIR="/apps/monitoring/current"
            DATA_DIR="/apps/monitoring/data"

            mkdir -p "$DEPLOY_DIR" "$DATA_DIR"
            if [ -f "$DEPLOY_DIR/monitoring.env" ]; then
              mv -f "$DEPLOY_DIR/monitoring.env" "$DEPLOY_DIR/.env"
            fi
            if [ -f "$DEPLOY_DIR/.env" ]; then
              chmod 600 "$DEPLOY_DIR/.env"
            fi

            cd "$DEPLOY_DIR"
            docker compose --env-file .env pull
            docker compose --env-file .env up -d

            echo "==> Health check"
            curl -sf http://127.0.0.1:5080/health

            echo "==> Container status"
            docker compose --env-file .env ps

            echo "✓ Monitoring stack deployed to prod VPS"

      - name: Deployment summary
        if: success()
        run: |
          {
            echo "## Deploy monitoring — Prod succeeded"
            echo "- Branch: \`${{ github.event.inputs.branch }}\`"
            echo "- Target: \`/apps/monitoring/current\` on prod VPS"
            echo "- UI: \`https://observe.lona.my\` (after nginx + DNS)"
            echo "- Actor: @${{ github.actor }}"
          } >> "$GITHUB_STEP_SUMMARY"

  guard:
    name: Confirm production deploy
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm != 'deploy'
    steps:
      - name: Require confirmation
        run: |
          echo "::error::Production deploy cancelled — type 'deploy' in the confirm field."
          exit 1
