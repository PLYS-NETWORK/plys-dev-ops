name: Deploy monitoring — Dev

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy (default: main)'
        required: false
        default: 'main'

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy OpenObserve to Dev VPS
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Render monitoring environment
        env:
          OPENOBSERVE_ROOT_PASSWORD: ${{ secrets.OPENOBSERVE_ROOT_PASSWORD }}
        run: node scripts/render-monitoring-env.mjs --deploy-env dev --output deploy/.env

      - name: Prepare deploy bundle
        run: |
          set -euo pipefail
          rm -rf deploy-package
          mkdir -p deploy-package
          cp monitoring/docker-compose.yml deploy-package/
          cp monitoring/otel-collector-config.yaml deploy-package/
          cp deploy/.env deploy-package/.env
          # scp-action runs tar in a container user that cannot read mode-600 files owned by the runner.
          chmod 644 deploy-package/.env
          ls -la deploy-package/

      - name: Upload to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: 'deploy-package/*'
          target: /apps/monitoring/current
          strip_components: 1

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -euo pipefail
            DEPLOY_DIR="/apps/monitoring/current"
            DATA_DIR="/apps/monitoring/data"

            mkdir -p "$DEPLOY_DIR" "$DATA_DIR"
            chmod 600 "$DEPLOY_DIR/.env"

            cd "$DEPLOY_DIR"
            docker compose --env-file .env pull
            docker compose --env-file .env up -d

            echo "==> Health check"
            curl -sf http://127.0.0.1:5080/health

            echo "==> Container status"
            docker compose --env-file .env ps

            echo "✓ Monitoring stack deployed to dev VPS"

      - name: Deployment summary
        if: success()
        run: |
          {
            echo "## Deploy monitoring — Dev succeeded"
            echo "- Branch: \`${{ github.event.inputs.branch }}\`"
            echo "- Target: \`/apps/monitoring/current\` on dev VPS"
            echo "- UI: \`https://observe-dev.lona.my\` (after nginx + DNS)"
            echo "- Actor: @${{ github.actor }}"
          } >> "$GITHUB_STEP_SUMMARY"
