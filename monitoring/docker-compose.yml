# Deployed to /apps/monitoring/current via GitHub Actions.
# Data persists in /apps/monitoring/data (host bind mount).
# Loopback-only ports — expose UI via nginx (observe-dev.lona.my / observe.lona.my).

# Isolate from app stacks that also use a "current" deploy directory (default project name).
name: plys-monitoring

services:
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:v0.90.0
    container_name: openobserve
    restart: unless-stopped
    environment:
      ZO_ROOT_USER_EMAIL: ${ZO_ROOT_USER_EMAIL:?set ZO_ROOT_USER_EMAIL}
      ZO_ROOT_USER_PASSWORD: ${ZO_ROOT_USER_PASSWORD:?set OPENOBSERVE_ROOT_PASSWORD in GitHub}
      ZO_DATA_DIR: /data
      ZO_LOCAL_MODE: "true"
      ZO_MEMORY_CACHE_ENABLED: "true"
      ZO_MEMORY_CACHE_MAX_SIZE: "256"
    ports:
      - "127.0.0.1:5080:5080"
    volumes:
      - ${OPENOBSERVE_DATA_DIR:-/apps/monitoring/data}:/data
    # Official image has no curl/shell — in-container healthcheck always fails (see openobserve#6561).
    networks:
      - monitoring-net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    container_name: otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    environment:
      DEPLOY_ENV: ${DEPLOY_ENV:?set DEPLOY_ENV}
      OPENOBSERVE_AUTH_B64: ${OPENOBSERVE_AUTH_B64:?set OPENOBSERVE_AUTH_B64}
      OPENOBSERVE_ORG: ${OPENOBSERVE_ORG:-plys}
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - /apps/internal-hub-be:/host/internal-hub-be:ro
      - /apps/internal-hub-fe:/host/internal-hub-fe:ro
      - /apps/plys-webapps:/host/plys-webapps:ro
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    depends_on:
      openobserve:
        condition: service_started
    networks:
      - monitoring-net

networks:
  monitoring-net:
    driver: bridge
