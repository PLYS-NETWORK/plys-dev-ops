# Dev VPS only — copy to /apps/docker-compose.yml
# Postgres plys-db-dev :5433, Redis :6380
# Adminer :8080, Redis Insight :5540 (loopback; see docs/vps-started/04-data-tools-adminer-redis.md)

services:
  postgres-dev:
    image: postgres:16-alpine
    container_name: postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: plys_dev
      POSTGRES_PASSWORD: "${POSTGRES_DEV_PASSWORD:?set POSTGRES_DEV_PASSWORD}"
      POSTGRES_DB: plys-db-dev
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data

  redis-dev:
    image: redis:7-alpine
    container_name: redis-dev
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_DEV_PASSWORD:?set REDIS_DEV_PASSWORD}"
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis-dev-data:/data

  adminer:
    image: adminer:4
    container_name: adminer
    restart: unless-stopped
    depends_on:
      - postgres-dev
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres-dev

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    restart: unless-stopped
    depends_on:
      - redis-dev
    ports:
      - "127.0.0.1:5540:5540"
    volumes:
      - redisinsight-data:/data

volumes:
  postgres-dev-data:
  redis-dev-data:
  redisinsight-data:
